<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Runner — SWE402 Live Code Preview</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <meta name="theme-color" content="#09090d">

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://htmlrunner.h190k.com/">
    <meta property="og:title" content="HTML Runner — SWE402 Live Code Preview">
    <meta property="og:description" content="A client-side HTML, CSS, and JavaScript live preview tool for SWE402. Write code, preview in desktop, tablet, and mobile views, and download as a zip file.">
    <meta property="og:image" content="https://htmlrunner.h190k.com/assets/favicon.png">

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:site" content="@h190k">
    <meta name="twitter:title" content="HTML Runner — SWE402 Live Code Preview">
    <meta name="twitter:description" content="A client-side HTML, CSS, and JavaScript live preview tool for SWE402. Write code, preview in desktop, tablet, and mobile views, and download as a zip file.">
    <meta name="twitter:image" content="https://htmlrunner.h190k.com/assets/favicon.png">

    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="toolbar">
        <div class="toolbar-left">
            <h1 class="logo">HTML<span>Runner</span></h1>
        </div>

        <div class="toolbar-right">
            <button class="btn btn-about" id="aboutBtn" aria-label="About">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="16" x2="12" y2="12"></line>
                    <line x1="12" y1="8" x2="12.01" y2="8"></line>
                </svg>
                <span>About</span>
            </button>
            <button class="btn btn-run" id="runBtn" aria-label="Run code">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                    <polygon points="5 3 19 12 5 21 5 3"></polygon>
                </svg>
                <span>Run / Rerun</span>
            </button>
            <button class="btn btn-save" id="saveBtn" aria-label="Save as ZIP">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
                <span>Save</span>
            </button>
        </div>
    </header>

    <main class="main-container">
        <section class="editor-panel">
            <div class="editor-tabs">
                <button class="tab-btn active" data-tab="html">HTML</button>
                <button class="tab-btn" data-tab="css">CSS</button>
                <button class="tab-btn" data-tab="js">JavaScript</button>
            </div>
            <div class="editor-container">
                <textarea
                    id="htmlEditor"
                    class="code-editor active"
                    data-lang="html"
                    placeholder="<!-- Write your HTML here -->"
                    spellcheck="false"
                    aria-label="HTML code editor"
                ></textarea>
                <textarea
                    id="cssEditor"
                    class="code-editor"
                    data-lang="css"
                    placeholder="/* Write your CSS here */"
                    spellcheck="false"
                    aria-label="CSS code editor"
                ></textarea>
                <textarea
                    id="jsEditor"
                    class="code-editor"
                    data-lang="js"
                    placeholder="// Write your JavaScript here"
                    spellcheck="false"
                    aria-label="JavaScript code editor"
                ></textarea>
            </div>
        </section>

        <section class="preview-panel" aria-label="Live preview">
            <div class="preview-header">
                <span class="preview-title">Live Preview</span>
                <div class="device-modes">
                    <button class="device-btn active" data-device="desktop" aria-label="Desktop view">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                            <line x1="8" y1="21" x2="16" y2="21"></line>
                            <line x1="12" y1="17" x2="12" y2="21"></line>
                        </svg>
                        <span>Desktop</span>
                    </button>
                    <button class="device-btn" data-device="tablet" aria-label="Tablet view">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect>
                            <line x1="12" y1="18" x2="12.01" y2="18"></line>
                        </svg>
                        <span>Tablet</span>
                    </button>
                    <button class="device-btn" data-device="mobile" aria-label="Mobile view">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect>
                            <line x1="12" y1="18" x2="12.01" y2="18"></line>
                        </svg>
                        <span>Mobile</span>
                    </button>
                </div>
                <span class="preview-dimensions" id="dimensionsLabel">1200 × AUTO</span>
            </div>
            <div class="preview-wrapper" id="previewWrapper">
                <iframe
                    id="previewFrame"
                    title="Code preview"
                    sandbox="allow-scripts allow-same-origin"
                    aria-label="Preview frame"
                ></iframe>
            </div>
        </section>
    </main>

    <footer class="footer">
        <span>&copy; <span id="yearDisplay"></span> H190K.</span>
        <span>All rights reserved.</span>
    </footer>

    <!-- About Modal -->
    <div class="modal-overlay" id="aboutModal" aria-hidden="true">
        <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="aboutTitle">
            <button class="modal-close" id="modalClose" aria-label="Close about modal">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
            <div class="modal-body" id="aboutContent"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
